<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Compilador PyScript Web</title>
    <style>
        /* Estilos básicos para la pantalla dividida */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; display: flex; height: 100vh; }
        #editor-container { width: 50%; padding: 20px; background-color: #f8f9fa; border-right: 2px solid #ddd; display: flex; flex-direction: column; }
        
        /* AQUÍ HICIMOS EL CAMBIO: Fondo negro puro y letras blancas estilo CMD */
        #consola-container { width: 50%; padding: 20px; background-color: #000000; color: white; display: flex; flex-direction: column; }
        
        h2 { margin-top: 0; color: #333; }
        #consola-container h2 { color: #fff; border-bottom: 1px solid #333; padding-bottom: 10px; }
        textarea { flex-grow: 1; font-family: 'Courier New', Courier, monospace; font-size: 16px; padding: 15px; border: 1px solid #ccc; border-radius: 5px; resize: none; }
        button { margin-top: 15px; padding: 12px; font-size: 16px; font-weight: bold; cursor: pointer; background-color: #007acc; color: white; border: none; border-radius: 5px; transition: 0.3s; }
        button:hover { background-color: #005999; }
        pre { flex-grow: 1; white-space: pre-wrap; word-wrap: break-word; font-family: 'Consolas', 'Courier New', monospace; font-size: 16px; overflow-y: auto; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="editor-container">
        <h2>Editor PyScript</h2>
        <textarea id="codigo" placeholder="Escribe tu código PyScript aquí...
Ejemplo:
<script type='py'>
    print('Hola mundo')
</script>"></textarea>
        <button onclick="enviarCodigo()">Compilar y Ejecutar ▶</button>
    </div>

    <div id="consola-container">
        <h2>Consola de Salida</h2>
        <pre id="resultado">Esperando código...</pre>
    </div>

    <script>
        function enviarCodigo() {
            const codigoTexto = document.getElementById('codigo').value;
            const consola = document.getElementById('resultado');
            
            consola.innerText = "Compilando...";

            // Hacemos la petición al servidor Flask
            fetch('/compilar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ codigo: codigoTexto })
            })
            .then(respuesta => respuesta.json())
            .then(datos => {
                // Mostramos lo que respondió el servidor en la consola
                consola.innerText = datos.resultado;
            })
            .catch(error => {
                consola.innerText = "Error: No se pudo conectar con el servidor.";
            });
        }
    </script>

</body>
</html>
