<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Compilador PyScript Web</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; display: flex; height: 100vh; }
        #editor-container { width: 50%; padding: 20px; background-color: #f8f9fa; border-right: 2px solid #ddd; display: flex; flex-direction: column; }
        #consola-container { width: 50%; padding: 20px; background-color: #000000; color: white; display: flex; flex-direction: column; }
        h2 { margin-top: 0; color: #333; }
        .consola-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .consola-header h2 { color: #fff; margin: 0; border: none; padding: 0; }
        textarea { flex-grow: 1; font-family: 'Courier New', Courier, monospace; font-size: 16px; padding: 15px; border: 1px solid #ccc; border-radius: 5px; resize: none; }
        #btn-compilar { margin-top: 15px; padding: 12px; font-size: 16px; font-weight: bold; cursor: pointer; background-color: #007acc; color: white; border: none; border-radius: 5px; transition: 0.3s; }
        #btn-compilar:hover { background-color: #005999; }
        #btn-limpiar { padding: 6px 15px; font-size: 14px; cursor: pointer; background-color: transparent; color: white; border: 1px solid #ccc; border-radius: 3px; transition: 0.3s; }
        #btn-limpiar:hover { background-color: rgba(255, 255, 255, 0.1); }
        pre { flex-grow: 1; white-space: pre-wrap; word-wrap: break-word; font-family: 'Consolas', 'Courier New', monospace; font-size: 16px; overflow-y: auto; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="editor-container">
        <h2>Editor PyScript</h2>
        <textarea id="codigo" placeholder="Escribe tu código PyScript aquí..."></textarea>
        <button id="btn-compilar" py-click="enviar_codigo">Compilar y Ejecutar ▶</button>
    </div>

    <div id="consola-container">
        <div class="consola-header">
            <h2>Consola de Salida</h2>
            <button id="btn-limpiar" py-click="limpiar_consola">Clear</button>
        </div>
        <pre id="resultado">Esperando código...</pre>
    </div>

    <script type="py">
import json
from pyodide.http import pyfetch
from js import document

async def enviar_codigo(event):
    consola = document.getElementById('resultado')
    codigo_texto = document.getElementById('codigo').value
    consola.innerText = "Compilando..."
    try:
        respuesta = await pyfetch('/compilar', method='POST', headers={'Content-Type': 'application/json'}, body=json.dumps({'codigo': codigo_texto}))
        datos = await respuesta.json()
        consola.innerText = datos['resultado']
    except Exception as e:
        consola.innerText = "Error: No se pudo conectar con el servidor Flask."

def limpiar_consola(event):
    document.getElementById('resultado').innerText = "Esperando código..."
    </script>

</body>
</html>
